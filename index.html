<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Tienda Online Collective World</title>
</head>
<body>
    <header>
        <div class="container">
            <img src="images/COLLECTIVEWORLD.png" alt="logo Collective World" width="15%" id="logo">
            <!--<hr>-->
            <nav class="menu_options">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li><a href="#">Productos</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <h1>Collective World</h1>
        </section>

        <section>
            <div class="productos">
                <div class="producto 1">
                    <img src="images/harry-potter.webp" alt="Imagen de Funko Harry Potter" class="img-producto">
                    <h3>Muñeco Funko Harry Potter Quidditch</h3>
                    <p>$10000</p>
                </div>

                <div class="producto 2">
                    <img src="images/mickey-mouse.webp" alt="Imagen de Muñeco Mickey Mouse" class="img-producto">
                    <h3>Muñeco Imantado Mickey Mouse Disney</h3>
                    <p>$15000</p>
                </div>

                <div class="producto 3">
                    <img src="images/chopper.jpg" alt="Imagen de Muñeco Chopper Star Wars" class="img-producto">
                    <h3>Muñeco Chopper Star Wars</h3>
                    <p>$8000</p>
                </div>
            </div>
        </section>
        
        
        
        
        <section>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/hFogGshWMlA?si=DIoLvXaF5WL5NtSW" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </section>

        <section>
            <h2>Envianos tu mensaje</h2>
            <form action="https://formspree.io/f/xzzrzzwb" method="POST">
                <label for="name">Nombre</label>
                <input type="text" name="name" id="name" placeholder="Nombre">
                
                <br>
                <br>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Correo Electrónico">

                <br>
                <br>

                <label for="message">Mensaje</label>
                <textarea name="message" id="message" placeholder="Introduce tu mensaje"></textarea>

                <br>
                <br>

                <input type="submit" name="submit" id="submit" value="Enviar">
                
            </form>
        </section>
    </main>

    <footer>
        <hr>
        <p>Desarrollado por Paola Bocalandro - 2025</p> 
        <a href="https://www.instagram.com/"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.facebook.com/"><i class="fa-brands fa-facebook-f"></i></a>
    </footer>
</body>
</html>
