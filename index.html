<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Tienda Online Collective World</title>
</head>
<body>
    <header>
        <div class="container">
            <img src="images/COLLECTIVEWORLD.png" alt="logo Collective World" width="15%" id="logo">
            <h1>Collective World</h1>
            <!--<hr>-->
            <nav class="menu_options">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Nosotros</a></li>
                    <li><a href="#">Productos</a></li>
                    <li><a href="#">Servicios</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/hFogGshWMlA?si=DIoLvXaF5WL5NtSW" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </section>

        <form action="https://formspree.io/f/xzzrzzwb" method="POST">
            <label for="name">Nombre</label>
            <input type="text" name="name" id="name" placeholder="Nombre">
            
            <br>
            <br>

            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Correo Electrónico">

            <br>
            <br>

            <label for="message">Mensaje</label>
            <textarea name="message" id="message" placeholder="Introduce tu mensaje"></textarea>

            <br>
            <br>

            <input type="submit" name="submit" id="submit" value="Enviar">
            
        </form>
    </main>

    <footer>
        <hr>
        <p>Desarrollado por Paola Bocalandro - 2025</p> 
    </footer>
</body>
</html>
